<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Hindustan Club - Multi-Browser Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            padding: 10px;
        }
        .header {
            background-color: #1e1e1e;
            padding: 15px;
            border-bottom: 3px solid #ffcc00;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wallet { color: #1df26b; font-weight: bold; font-size: 20px; }
        .game-card {
            background-color: #1e1e1e;
            margin: 15px auto;
            padding: 20px;
            border-radius: 10px;
            max-width: 450px;
            border: 1px solid #333;
        }
        button {
            background-color: #ffcc00;
            color: black;
            border: none;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="number"] {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px;
            width: 80px;
            border-radius: 5px;
            text-align: center;
        }
        .btn-red { background-color: #ff3333; color: white; }
        .btn-green { background-color: #1df26b; color: black; }
        .btn-blue { background-color: #2196f3; color: white; }
        .btn-violet { background-color: #9c27b0; color: white; }
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            max-width: 250px;
            margin: 15px auto;
        }
        .mine-box {
            background-color: #333;
            height: 45px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>👑 HINDUSTAN CLUB</h2>
        <div class="wallet">Wallet: ₹<span id="balance">50000</span></div>
    </div>

    <div class="game-card">
        <h3>🚀 CRASH ROCKET</h3>
        <p>Min Bet: ₹10 | Bet Amount: <input type="number" id="rocketBet" value="10" min="10"></p>
        <p style="margin: 10px 0;">Multiplier: <span id="multiplier" style="color: #ffcc00; font-size: 24px; font-weight: bold;">1.00x</span></p>
        <button onclick="startRocket()">Bet Lagayein</button>
        <button class="btn-green" onclick="cashOut()">CASH OUT</button>
    </div>

    <div class="game-card">
        <h3>🏏 LIVE CRICKET (Min Bet: ₹100)</h3>
        <p>Target: 45 Runs (India vs Pak)</p>
        <button onclick="placeCricketBet('YES')">👍 YES (₹100)</button>
        <button onclick="placeCricketBet('NO')" class="btn-red">👎 NO (₹100)</button>
        <hr style="border-color: #333; margin: 15px 0;">
        <button class="btn-blue" onclick="triggerCricketDraw()">🤝 MATCH DRAW / RADD (Refund)</button>
        <p id="cricket-status" style="font-weight: bold; color: #ffcc00; margin-top: 10px;"></p>
    </div>

    <div class="game-card">
        <h3>💣 BAM BUSTER</h3>
        <p>Min Bet: ₹10 | Bet Amount: <input type="number" id="minesBet" value="10" min="10"></p>
        <button id="start-mines-btn" onclick="startMines()">Game Shuru Karein</button>
        <button id="claim-mines-btn" class="btn-green" onclick="claimMines()" style="display:none;">💥 PROFIT NIKALEIN</button>
        <div class="mines-grid" id="minesGrid"></div>
    </div>

    <div class="game-card">
        <h3>🎨 COLOR PREDICTION</h3>
        <p>Min Bet: ₹10 | Bet Amount: <input type="number" id="colorBet" value="10" min="10"></p>
        <button class="btn-green" onclick="predictColor('GREEN')">GREEN (2x)</button>
        <button class="btn-violet" onclick="predictColor('VIOLET')">VIOLET (4.5x)</button>
        <button class="btn-red" onclick="predictColor('RED')">RED (2x)</button>
        <p id="color-result" style="margin-top: 10px; font-weight: bold;"></p>
    </div>

    <script>
        let balance = localStorage.getItem('h_balance') ? parseInt(localStorage.getItem('h_balance')) : 50000;
        let activeCricketBets = 0;

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            localStorage.setItem('h_balance', balance);
        }

        // --- ROCKET CODE ---
        let rocketInterval;
        let currentMultiplier = 1.0;
        let isRocketPlaying = false;
        let lastRocketBet = 10;

        function startRocket() {
            let betInput = parseInt(document.getElementById('rocketBet').value);
            if(betInput < 10 || isNaN(betInput)) { alert("Kam se kam ₹10 lagayein!"); return; }
            if(balance < betInput) { alert("Balance kam hai!"); return; }
            if(isRocketPlaying) return;

            isRocketPlaying = true;
            lastRocketBet = betInput;
            balance -= lastRocketBet;
            updateUI();
            currentMultiplier = 1.0;
            let crashPoint = (Math.random() * 3 + 1.1).toFixed(2); 

            rocketInterval = setInterval(() => {
                currentMultiplier += 0.05;
                document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
                if (currentMultiplier >= crashPoint) {
                    clearInterval(rocketInterval);
                    alert("💥 Crash! Rocket " + crashPoint + "x par blast ho gaya.");
                    isRocketPlaying = false;
                    document.getElementById('multiplier').innerText = "1.00x";
                }
            }, 100);
        }

        function cashOut() {
            if(!isRocketPlaying) return;
            clearInterval(rocketInterval);
            let winAmount = Math.floor(lastRocketBet * currentMultiplier);
            balance += winAmount;
            updateUI();
            alert("💰 Aapne ₹" + winAmount + " Cash Out kar liye!");
            isRocketPlaying = false;
            document.getElementById('multiplier').innerText = "1.00x";
        }

        // --- CRICKET CODE ---
        function placeCricketBet(prediction) {
            if(balance < 100) { alert("Cricket ke liye kam se kam ₹100 chahiye!"); return; }
            balance -= 100;
            activeCricketBets++;
            updateUI();
            document.getElementById('cricket-status').innerText = `✅ Bet lag gayi!`;
        }

        function triggerCricketDraw() {
            if(activeCricketBets === 0) return;
            let refund = activeCricketBets * 100;
            balance += refund;
            activeCricketBets = 0;
            updateUI();
            document.getElementById('cricket-status').innerText = "🤝 Match Draw! Paisa Refunded.";
            alert(`🤝 Aapke ₹${refund} wapas kar diye gaye hain.`);
        }

        // --- MINES CODE ---
        let minePositions = [];
        let isMinesPlaying = false;
        let minesOpened = 0;
        let lastMinesBet = 10;

        function startMines() {
            let betInput = parseInt(document.getElementById('minesBet').value);
            if(betInput < 10 || isNaN(betInput)) { alert("Min Bet ₹10!"); return; }
            if(balance < betInput) { alert("Balance kam hai!"); return; }
            
            isMinesPlaying = true;
            lastMinesBet = betInput;
            balance -= lastMinesBet;
            updateUI();
            minesOpened = 0;
            
            document.getElementById('start-mines-btn').style.display = 'none';
            document.getElementById('claim-mines-btn').style.display = 'inline-block';

            minePositions = [];
            while(minePositions.length < 3) {
                let r = Math.floor(Math.random() * 25);
                if(!minePositions.includes(r)) minePositions.push(r);
            }

            let gridHtml = '';
            for(let i=0; i<25; i++) {
                gridHtml += `<div class="mine-box" id="box-${i}" onclick="clickBox(${i})">?</div>`;
            }
            document.getElementById('minesGrid').innerHTML = gridHtml;
        }

        function clickBox(id) {
            if(!isMinesPlaying) return;
            let box = document.getElementById(`box-${id}`);
            if(box.innerText !== '?') return;

            if(minePositions.includes(id)) {
                box.innerText = '💣';
                box.style.backgroundColor = '#ff3333';
                isMinesPlaying = false;
                alert("💣 Bam bol gaya!");
                resetMinesUi();
            } else {
                box.innerText = '💎';
                box.style.backgroundColor = '#1df26b';
                box.style.color = 'black';
                minesOpened++;
            }
        }

        function claimMines() {
            if(!isMinesPlaying || minesOpened === 0) return;
            let profit = Math.floor(lastMinesBet + (minesOpened * (lastMinesBet * 0.2))); 
            balance += profit;
            updateUI();
            alert("💰 Profit Claimed: ₹" + profit);
            resetMinesUi();
        }

        function resetMinesUi() {
            isMinesPlaying = false;
            document.getElementById('start-mines-btn').style.display = 'inline-block';
            document.getElementById('claim-mines-btn').style.display = 'none';
            document.getElementById('minesGrid').innerHTML = '';
        }

        // --- COLOR LOGIC ---
        function predictColor(userChoice) {
            let betInput = parseInt(document.getElementById('colorBet').value);
            if(betInput < 10 || isNaN(betInput)) { alert("Min Bet ₹10!"); return; }
            if(balance < betInput) { alert("Balance kam hai!"); return; }

            balance -= betInput;
            updateUI();

            let colors = ['GREEN', 'RED', 'GREEN', 'RED', 'VIOLET'];
            let winningColor = colors[Math.floor(Math.random() * colors.length)];
            let resultText = document.getElementById('color-result');
            resultText.innerText = "Checking Result...";

            setTimeout(() => {
                if(userChoice === winningColor) {
                    let mult = (winningColor === 'VIOLET') ? 4.5 : 2.0;
                    let win = betInput * mult;
                    balance += win;
                    resultText.innerText = "🎉 Winner: " + winningColor + "! Jeete ₹" + win;
                    resultText.style.color = '#1df26b';
                } else {
                    resultText.innerText = "❌ Loss: " + winningColor + " aaya.";
                    resultText.style.color = '#ff3333';
                }
                updateUI();
            }, 800);
        }

        updateUI();
    </script>
</body>
</html>
